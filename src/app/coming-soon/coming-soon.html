<div class="bulldozer-area flex-grow-1 d-flex align-items-center justify-content-center w-100" #bulldozerArea>
    <h1 class="centered-heading">COMING SOON</h1>
    <div #bulldozer [ngStyle]="elementStyle">
        <div class="speech-bubble" [hidden]="hideBubble">
            {{ taunt }}
        </div>
        <img class="bulldozer"
            ngSrc="assets/img/bulldozer.png"
            [width]="bulldozerSize"
            [height]="bulldozerSize"
            (mouseenter)="onMouseEnter()"
            (mouseover)="onMouseOver()"
            (mouseleave)="onMouseLeave()"
            (touchstart)="onMouseEnter()">
    </div>
</div>
